<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Học Viên - KidsEnglish</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #4318FF;
            --secondary: #FF8A4C;
            --bg-body: #F4F7FE;
            --white: #FFFFFF;
            --text-dark: #2B3674;
            --text-gray: #A3AED0;
            --border: #E9EDF7;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        
        body { 
            background: var(--bg-body); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }

        .register-container {
            background: var(--white);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .logo {
            font-family: 'Baloo 2', cursive;
            font-size: 2.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-gray);
            font-weight: 700;
            margin-bottom: 30px;
            font-size: 1.05rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid var(--border);
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            transition: all 0.3s;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(67, 24, 255, 0.1);
        }

        .btn-register {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-register:hover {
            background: #3311DB;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(67, 24, 255, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            font-weight: 700;
            color: var(--text-gray);
        }

        .login-link a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 800;
            transition: 0.3s;
        }

        .login-link a:hover {
            color: #e67332;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="logo">KidsEnglish</div>
        <div class="subtitle">Đăng ký tài khoản học tập cho bé</div>

        <form id="registerForm">
            <div class="form-group">
                <label>Họ và tên của bé</label>
                <input type="text" id="fullName" placeholder="VD: Nguyễn Minh Anh" required>
            </div>

            <div class="form-group">
                <label>Email đăng nhập</label>
                <input type="email" id="email" placeholder="VD: minhanh@kids.vn" required>
            </div>

            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
            </div>

            <button type="submit" class="btn-register">Đăng ký ngay 🚀</button>
        </form>

        <div class="login-link">
            Đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Ngăn trang tự động tải lại khi ấn Submit

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // 1. Kiểm tra mật khẩu xác nhận
            if (password !== confirmPassword) {
                return Swal.fire('Lỗi', 'Mật khẩu xác nhận không khớp. Vui lòng kiểm tra lại!', 'error');
            }

            // 2. Lấy dữ liệu Database từ LocalStorage
            let db = JSON.parse(localStorage.getItem('ks_db'));
            if (!db) {
                db = { users: [], classes: [], quizzes: [], lessons: [], pending_users: [] };
            }
            if (!db.pending_users) db.pending_users = [];

            // 3. Kiểm tra xem Email đã tồn tại trong hệ thống chưa
            const userExists = db.users.some(u => u.email === email);
            const pendingExists = db.pending_users.some(u => u.email === email);

            if (userExists || pendingExists) {
                return Swal.fire('Lỗi', 'Email này đã được sử dụng hoặc đang chờ duyệt!', 'warning');
            }

            // 4. Nếu hợp lệ, đưa vào danh sách Chờ Duyệt (pending_users)
            db.pending_users.push({
                id: Date.now(), // Tạo ID ngẫu nhiên bằng thời gian
                fullName: fullName,
                email: email,
                password: password,
                createdAt: new Date().toISOString()
            });

            // 5. Lưu lại vào hệ thống
            localStorage.setItem('ks_db', JSON.stringify(db));

            // 6. Báo thành công và chuyển hướng
            Swal.fire({
                title: 'Thành công! 🎉',
                text: 'Đơn đăng ký của bé đã được gửi. Vui lòng chờ Thầy/Cô duyệt nhé!',
                icon: 'success',
                confirmButtonText: 'Quay lại đăng nhập',
                confirmButtonColor: '#4318FF'
            }).then(() => {
                window.location.href.html = 'login.html'; // Chuyển về trang đăng nhập
            });
        });
    </script>

</body>
</html>
