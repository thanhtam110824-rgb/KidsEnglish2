<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - KidsEnglish</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Baloo+2:wght@600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #4F8CFF; --secondary: #FF9A3C; --bg: #F4F7FE; --text-dark: #2B3674; --text-gray: #A3AED0; --white: #FFFFFF; --border: #E2E8F0; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; max-width: 1200px; width: 100%; align-items: center; }
        @media (max-width: 900px) { .container { grid-template-columns: 1fr; gap: 40px; } .content { display: none; } }
        .content { color: white; text-align: center; }
        .content h1 { font-family: 'Baloo 2', cursive; font-size: 3.5rem; font-weight: 800; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        .card { background: var(--white); padding: 50px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); width: 100%; }
        .logo { font-family: 'Baloo 2', cursive; font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 30px; }
        .title { font-family: 'Baloo 2', cursive; font-size: 2rem; font-weight: 800; color: var(--text-dark); margin-bottom: 10px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 800; color: var(--text-dark); }
        input { width: 100%; padding: 14px 18px; border: 2px solid var(--border); border-radius: 12px; font-size: 1rem; font-weight: 600; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(79, 140, 255, 0.1); }
        .btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3); }
        .login-link { text-align: center; margin-top: 25px; color: var(--text-gray); font-weight: 600; }
        .login-link a { color: var(--primary); font-weight: 800; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>🌟 Kids English</h1>
            <p>Tham gia cộng đồng học tiếng Anh vui nhộn!</p>
        </div>
        <div class="card">
            <div class="logo">Kids<span style="color: #FF9A3C;">English</span></div>
            <h2 class="title">Đăng ký</h2>
            <form id="register-form">
                <div class="form-group">
                    <label>👤 Họ và tên của bé</label>
                    <input type="text" id="fullName" placeholder="VD: Nguyễn Văn A" required>
                </div>
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" placeholder="email@vi-du.com" required>
                </div>
                <div class="form-group">
                    <label>🔑 Mật khẩu</label>
                    <input type="password" id="password" placeholder="Tối thiểu 6 ký tự..." required>
                </div>
                <button type="submit" class="btn">Tạo tài khoản ngay 🚀</button>
            </form>
            <div class="login-link">
                Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAOluRNafW_Rk7IHPViAaQInGSJU1sAi9w",
            authDomain: "kidsenglish2.firebaseapp.com",
            projectId: "kidsenglish2",
            storageBucket: "kidsenglish2.firebasestorage.app",
            messagingSenderId: "25492249032",
            appId: "1:25492249032:web:67502896b604909ee7c8fd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            Swal.fire({ title: 'Đang tạo tài khoản...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    fullName: fullName,
                    email: email,
                    role: 'student',
                    status: 'pending',
                    classId: null,
                    score: 0,
                    createdAt: new Date().toISOString()
                });

                Swal.fire({ 
                    icon: 'success', 
                    title: 'Gửi hồ sơ thành công! 🎉', 
                    text: 'Tài khoản đang được Thầy/Cô xét duyệt. Vui lòng chờ nhé!', 
                    timer: 3500, 
                    showConfirmButton: false 
                }).then(() => {
                    window.location.href = 'login.html';
                });
            } catch (error) {
                console.error(error);
                let message = 'Lỗi không xác định!';
                if (error.code === 'auth/email-already-in-use') message = 'Email này đã được đăng ký rồi!';
                if (error.code === 'auth/weak-password') message = 'Mật khẩu quá yếu (cần ít nhất 6 ký tự)!';
                Swal.fire({ icon: 'error', title: 'Lỗi!', text: message });
            }
        });
    </script>
</body>
</html>
